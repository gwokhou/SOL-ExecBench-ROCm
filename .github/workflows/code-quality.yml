name: Python Quality

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_NO_PROGRESS: "1"

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Static quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install package
        run: uv sync --locked --all-groups
      - name: Run Ruff
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .
      - name: Run Ty
        run: uv run --no-sync ty check
      - name: Run architecture guardrails
        run: |
          uv run --no-sync python scripts/check_coupling.py
          uv run --no-sync python scripts/check_readability.py
          uv run --no-sync python scripts/check_current_docs.py
          uv run --no-sync python scripts/check_schema_versions.py

  package-tests:
    name: Package tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install package
        run: uv sync --locked --all-groups
      - name: Run sol-execbench tests
        run: |
          uv run --no-sync pytest tests/sol_execbench \
            --ignore=tests/sol_execbench/driver/test_eval_driver.py \
            --ignore=tests/sol_execbench/test_e2e.py
      - name: Run tools tests
        run: uv run --no-sync pytest tests/tools

  solar-tests:
    name: Solar tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install package
        run: uv sync --locked --all-groups
      - name: Run Solar tests with branch coverage
        run: |
          uv run --no-sync coverage erase
          uv run --no-sync coverage run -m pytest -n 0 tests/solar
          uv run --no-sync coverage json -o coverage.json
          uv run --no-sync python scripts/check_solar_coverage.py coverage.json

name: Prepare evidence bundle

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact release name, matching docs/releases/<tag>.evidence.json.
        required: true
        type: string

# This workflow can read the repository but never publishes, changes Git, or gets
# an OIDC token. The self-hosted runner must be repository-restricted and expose
# raw local evidence through EVIDENCE_SOURCE_ROOT. RUNNER_TEMP is deliberately
# used only for ephemeral staging because Actions clears it at job start.
permissions:
  contents: read

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, evidence-producer]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Validate dispatch and producer input boundary
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]
          test -f "docs/releases/${RELEASE_TAG}.evidence.json"
          test -n "${EVIDENCE_SOURCE_ROOT:-}"
          test -d "${EVIDENCE_SOURCE_ROOT}/${RELEASE_TAG}/source"
      - name: Stage and verify exact evidence bundle
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          source_root="${EVIDENCE_SOURCE_ROOT}/${RELEASE_TAG}/source"
          stage_root="${RUNNER_TEMP}/evidence/${RELEASE_TAG}/staged"
          archive_root="${RUNNER_TEMP}/evidence/${RELEASE_TAG}/artifact"
          rm -rf "$stage_root" "$archive_root"
          mkdir -p "$archive_root"
          uv sync --locked --all-groups
          uv run sol-execbench baseline publication stage \
            --manifest "docs/releases/${RELEASE_TAG}.evidence.json" \
            --source-root "$source_root" \
            --destination "$stage_root"
          uv run sol-execbench baseline publication verify \
            --manifest "docs/releases/${RELEASE_TAG}.evidence.json" \
            --artifact-root "$stage_root"
          tar -C "$stage_root" -czf "$archive_root/release.tar.gz" .
          (
            cd "$archive_root"
            sha256sum release.tar.gz > SHA256SUMS
            cp "$GITHUB_WORKSPACE/docs/releases/${RELEASE_TAG}.evidence.json" manifest.json
          )
      - name: Upload temporary reviewed publication input
        uses: actions/upload-artifact@v4
        with:
          name: evidence-release-${{ inputs.release_tag }}
          path: ${{ runner.temp }}/evidence/${{ inputs.release_tag }}/artifact
          if-no-files-found: error
          retention-days: 14

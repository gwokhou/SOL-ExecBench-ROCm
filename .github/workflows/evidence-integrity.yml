name: Verify published evidence

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Validate lifecycle index
        run: |
          uv sync --locked --all-groups
          uv run python tools/evidence_lifecycle.py \
            --registry docs/releases/evidence-lifecycle.json --repo-root .
      - name: Download and verify every active release
        id: integrity
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir downloaded artifacts
          jq -c '.records[] | select(.status == "published")' \
            docs/releases/evidence-lifecycle.json | while read -r record; do
              release=$(jq -r .release <<<"$record")
              manifest=$(jq -r .manifest <<<"$record")
              archive=$(jq -r .bundle_asset <<<"$record")
              expected=$(jq -r .bundle_sha256 <<<"$record")
              url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release}/${archive}"
              curl --fail --location --silent --show-error -o "downloaded/${archive}" "$url"
              actual=$(sha256sum "downloaded/${archive}" | awk '{print $1}')
              test "$actual" = "$expected"
              root="artifacts/${release}"
              mkdir "$root"
              tar -xzf "downloaded/${archive}" -C "$root"
              uv run sol-execbench baseline publication verify \
                --manifest "$manifest" --artifact-root "$root"
            done
      - name: Open one integrity incident when verification fails
        if: steps.integrity.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search '"Evidence integrity failure" in:title' --json number --jq 'length')
          if [ "$existing" = 0 ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Evidence integrity failure" \
              --body "The protected read-only evidence integrity workflow failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Do not make new authority claims until it is resolved."
          fi
      - name: Fail the workflow after filing the incident
        if: steps.integrity.outcome == 'failure'
        run: exit 1

name: Publish evidence bundle

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact release name, matching docs/releases/<tag>.evidence.json.
        required: true
        type: string
      prepare_run_id:
        description: Successful "Prepare evidence bundle" workflow run ID.
        required: true
        type: string
      supersedes:
        description: Optional active release replaced by this evidence bundle.
        required: false
        type: string

# Keep the workflow read-only by default. In single-maintainer mode, only this
# manual main-branch job receives temporary release, attestation, and lifecycle
# index write access.
permissions:
  actions: read
  contents: read

concurrency:
  group: evidence-publish-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: evidence-publish
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - name: Validate single-maintainer publishing dispatch
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]
          test -f "docs/releases/${RELEASE_TAG}.evidence.json"
      - name: Download only a successful prepare artifact from main
        env:
          GH_TOKEN: ${{ github.token }}
          PREPARE_RUN_ID: ${{ inputs.prepare_run_id }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PREPARE_RUN_ID}")
          test "$(jq -r .name <<<"$run")" = "Prepare evidence bundle"
          test "$(jq -r .conclusion <<<"$run")" = "success"
          test "$(jq -r .head_branch <<<"$run")" = "main"
          gh run download "$PREPARE_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "evidence-release-${RELEASE_TAG}" --dir incoming
          cmp "incoming/manifest.json" "docs/releases/${RELEASE_TAG}.evidence.json"
          (
            cd incoming
            sha256sum --check SHA256SUMS
          )
      - name: Verify artifact closure before release creation
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir artifacts
          tar -xzf incoming/release.tar.gz -C artifacts
          uv sync --locked --all-groups
          uv run sol-execbench baseline publication verify \
            --manifest "docs/releases/${RELEASE_TAG}.evidence.json" \
            --artifact-root artifacts
      - name: Classify an existing release for safe recovery
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create immutable release assets
        if: steps.release_state.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            "incoming/release.tar.gz#${RELEASE_TAG}-evidence.tar.gz" \
            "incoming/SHA256SUMS#${RELEASE_TAG}-SHA256SUMS" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${RELEASE_TAG} evidence bundle" \
            --notes "Machine-published evidence bundle. Verify against docs/releases/${RELEASE_TAG}.evidence.json before relying on its scope claims."
      - name: Download public release and verify it again
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir public-download public-artifacts
          archive="${RELEASE_TAG}-evidence.tar.gz"
          curl --fail --location --silent --show-error \
            -o "public-download/${archive}" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${archive}"
          expected=$(awk '{print $1}' incoming/SHA256SUMS)
          actual=$(sha256sum "public-download/${archive}" | awk '{print $1}')
          test "$actual" = "$expected"
          tar -xzf "public-download/${archive}" -C public-artifacts
          uv run sol-execbench baseline publication verify \
            --manifest "docs/releases/${RELEASE_TAG}.evidence.json" \
            --artifact-root public-artifacts
      - name: Attest the verified published archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: incoming/release.tar.gz
      - name: Record published lifecycle state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}
          SUPERSEDES: ${{ inputs.supersedes }}
        run: |
          set -euo pipefail
          bundle_sha256=$(awk '{print $1}' incoming/SHA256SUMS)
          existing=$(jq -cer --arg release "$RELEASE_TAG" \
            '.records[] | select(.release == $release)' \
            docs/releases/evidence-lifecycle.json || true)
          if [ -n "$existing" ]; then
            test "$(jq -r .status <<<"$existing")" = published
            test "$(jq -r .bundle_sha256 <<<"$existing")" = "$bundle_sha256"
            test "$(jq -r .release_url <<<"$existing")" = "$RELEASE_URL"
            exit 0
          fi
          args=(
            --registry docs/releases/evidence-lifecycle.json
            --repo-root .
            --record-published
            --release "$RELEASE_TAG"
            --bundle-sha256 "$bundle_sha256"
            --release-url "$RELEASE_URL"
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          )
          if [ -n "$SUPERSEDES" ]; then
            args+=(--supersedes "$SUPERSEDES")
          fi
          uv run python tools/evidence_lifecycle.py "${args[@]}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/evidence-lifecycle.json
          git commit -s -m "Record published evidence ${RELEASE_TAG}"
          git push origin "HEAD:main"

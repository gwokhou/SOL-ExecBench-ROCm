default_install_hook_types: [pre-commit, commit-msg, pre-push]
repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff Check
        entry: uv run --locked ruff check --fix
        language: system
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: Ruff Format
        entry: uv run --locked ruff format
        language: system
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]
      - id: dco-sign-off
        name: DCO Sign-off Check
        entry: "bash -c 'grep -q \"^Signed-off-by: \" \"$1\"' --"
        language: system
        stages: [commit-msg]
      - id: ty-check
        name: Ty Type Check
        entry: uv run --locked ty check
        language: system
        pass_filenames: false
        stages: [pre-push]

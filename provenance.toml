version = 1
policy_doc = "docs/provenance.md"
upstream_repository = "https://github.com/NVIDIA/SOL-ExecBench"
upstream_ref = "upstream/main"
project_attribution = "Copyright (c) 2026 contributors to SOL ExecBench ROCm Port"

active_roots = [
  "README.md",
  "pyproject.toml",
  "src",
  "scripts",
  "tests",
  "docs",
  "examples",
  "docker",
]

[classes]
upstream_retained = [
  "Files copied verbatim or nearly verbatim from upstream SOL-ExecBench.",
]
derivative_modified = [
  "Files retaining substantial upstream expression after ROCm adaptation.",
  "Current exact-path upstream matches listed under nvidia_notice.allowed are treated as derivative-modified candidates until Phase 124 refines individual files.",
]
independent_rocm_work = [
  "New ROCm/AMD evidence, scoring, release, Docker dependency, documentation, and test files absent from the same upstream path.",
]
generated_or_planning = [
  ".planning/**",
  "Generated reports and demo evidence fixtures under docs/examples/**.",
]

[header_policy]
upstream_retained = "Keep applicable NVIDIA SPDX-FileCopyrightText and Apache-2.0 SPDX-License-Identifier."
derivative_modified = "Keep applicable NVIDIA SPDX-FileCopyrightText, add project SPDX-FileCopyrightText when modified, and keep Apache-2.0 SPDX-License-Identifier."
independent_rocm_work = "Use project SPDX-FileCopyrightText and Apache-2.0 SPDX-License-Identifier; do not use NVIDIA-only file copyright attribution."
generated_or_planning = "Use project attribution only when source-style headers are appropriate; otherwise document provenance at the directory or artifact level."


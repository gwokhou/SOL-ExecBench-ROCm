cleanup_candidates = []

[notes]
phase_123_scope = "Classification only."
phase_124_scope = "Header edits applied according to this manifest."
history_rewrite = "Not planned for ordinary blanket header correction."
legal_review = "This manifest is engineering provenance hygiene, not legal advice."
arch_capability_budgets_source = "src/sol_execbench/data/arch_capability_budgets/*.json transcribe public AMD ISA reference values (CDNA3/RDNA4 ISA guides mirrored via opengpu/rocm-systems). These are public hardware facts, not upstream-copyrighted expression; classified as independent_rocm_work under the project_owned_rocm_code src/** glob, with upstream attribution carried in each file's `source` and `evidence_refs` fields."
